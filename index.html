<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="佐瀬家アプリ">
  <meta name="theme-color" content="#1a1a2e">
  <title>佐瀬家アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="page">
    <header class="hero">
      <div class="hero-icon">🏠</div>
      <h1 class="hero-title">佐瀬家アプリ</h1>
      <p class="hero-sub">家族のためのアプリ一覧</p>
    </header>

    <main class="app-grid" id="appGrid"></main>

    <footer class="footer">
      <p>佐瀬家 プライベートアプリ</p>
    </footer>
  </div>

  <script>
    var APPS = [
      {
        emoji:       '📸',
        name:        '今日のことちゃん',
        desc:        '娘の成長アルバム。毎日1枚の写真と短いコメントで記録。',
        url:         'https://koto-chan.vercel.app/',
        color:       '#E8748A',
        colorLight:  '#FFF0F5',
        colorPale:   '#FCE8ED'
      },
      {
        emoji:       '🌙',
        name:        'こんや話そ',
        desc:        'ふたりの話し合いノート。いつか話したいことをメモして解決へ。',
        url:         'https://konya-hanaso.vercel.app/',
        color:       '#F59E0B',
        colorLight:  '#FEF3C7',
        colorPale:   '#FFFDF7'
      }
    ];

    function renderApps() {
      var grid = document.getElementById('appGrid');
      APPS.forEach(function(app) {
        var card = document.createElement('a');
        card.href   = app.url;
        card.target = '_blank';
        card.rel    = 'noopener noreferrer';
        card.className = 'app-card';
        card.innerHTML =
          '<div class="card-icon-wrap" style="background:' + app.colorLight + '">' +
            '<span class="card-icon">' + app.emoji + '</span>' +
          '</div>' +
          '<div class="card-body">' +
            '<h2 class="card-name">' + app.name + '</h2>' +
            '<p class="card-desc">' + app.desc + '</p>' +
          '</div>' +
          '<div class="card-arrow" style="color:' + app.color + '">→</div>';
        grid.appendChild(card);
      });
    }

    renderApps();
  </script>
</body>
</html>
