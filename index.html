<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="佐瀬家アプリ">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>佐瀬家アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="page">
    <header class="hero">
      <div class="hero-icon">🏠</div>
      <h1 class="hero-title">佐瀬家アプリ</h1>
      <p class="hero-sub">家族のためのアプリ一覧</p>
    </header>

    <main class="app-grid" id="appGrid"></main>

    <!-- ダッシュボード -->
    <section class="dashboard">
      <div class="section-divider">
        <span class="section-label">ダッシュボード</span>
      </div>

      <div class="dash-grid">

        <!-- 最新写真（全幅） -->
        <a href="https://koto-chan.vercel.app/" target="_blank" rel="noopener"
           class="dash-card card-photo" id="cardPhoto">
          <div class="dash-card-label">📸 最新のことね</div>
          <div class="photo-content" id="photoContent">
            <div class="dash-skeleton photo-skeleton"></div>
          </div>
        </a>

        <!-- 今週の予定（全幅） -->
        <a href="https://fufu-yotei.vercel.app/" target="_blank" rel="noopener"
           class="dash-card card-yotei" id="cardYotei">
          <div class="dash-card-label">📅 今週の予定</div>
          <div id="yoteiContent">
            <div class="dash-skeleton dash-skeleton-line"></div>
            <div class="dash-skeleton dash-skeleton-line" style="margin-top:8px;width:80%"></div>
          </div>
        </a>

        <!-- 前回のキャンプ -->
        <a href="https://fami-camp.vercel.app/" target="_blank" rel="noopener"
           class="dash-card card-last-camp" id="cardLastCamp">
          <div class="dash-card-label">🏕️ 前回のキャンプ</div>
          <div id="campLastContent">
            <div class="dash-skeleton dash-skeleton-line"></div>
            <div class="dash-skeleton dash-skeleton-line" style="margin-top:8px;width:70%"></div>
          </div>
        </a>

        <!-- 次のキャンプ -->
        <a href="https://fami-camp.vercel.app/" target="_blank" rel="noopener"
           class="dash-card card-camp" id="cardCamp">
          <div class="dash-card-label">🏕️ 次のキャンプ</div>
          <div id="campContent">
            <div class="dash-skeleton dash-skeleton-line"></div>
            <div class="dash-skeleton dash-skeleton-line" style="margin-top:8px;width:60%"></div>
          </div>
        </a>

        <!-- ことねの成長 -->
        <div class="dash-card card-age">
          <div class="dash-card-label">🍀 ことねの成長</div>
          <div class="age-display" id="ageDisplay">
            <span class="age-num" id="ageYears">-</span><span class="age-unit">歳</span>
            <span class="age-num" id="ageMonths">-</span><span class="age-unit">ヶ月</span>
          </div>
          <div class="age-days" id="ageDays">計算中…</div>
          <div class="age-next" id="ageNext"></div>
        </div>

        <!-- 話し合いトピック -->
        <a href="https://konya-hanaso.vercel.app/" target="_blank" rel="noopener"
           class="dash-card card-topics" id="cardTopics">
          <div class="dash-card-label">💬 話し合いたいこと</div>
          <div id="topicsContent">
            <div class="dash-skeleton dash-skeleton-line"></div>
            <div class="dash-skeleton dash-skeleton-line" style="margin-top:8px;width:75%"></div>
          </div>
        </a>

      </div>
    </section>

    <footer class="footer">
      <p>佐瀬家 プライベートアプリ</p>
    </footer>
  </div>

  <script>
    // ===== アプリ一覧 =====
    var APPS = [
      {
        emoji:      '📸',
        name:       '今日のことちゃん',
        desc:       '娘の成長アルバム。毎日1枚の写真と短いコメントで記録。',
        url:        'https://koto-chan.vercel.app/',
        color:      '#E8748A',
        colorLight: '#FFF0F5'
      },
      {
        emoji:      '🌙',
        name:       'こんや話そ',
        desc:       'ふたりの話し合いノート。いつか話したいことをメモして解決へ。',
        url:        'https://konya-hanaso.vercel.app/',
        color:      '#F59E0B',
        colorLight: '#FEF3C7'
      },
      {
        emoji:      '⛺',
        name:       'ふぁみキャン△',
        desc:       'キャンプの計画・記録帳。メンバー・料理・買い出し・写真をまとめて管理。',
        url:        'https://fami-camp.vercel.app/',
        color:      '#2D6A4F',
        colorLight: '#D1FAE5'
      },
      {
        emoji:      '📅',
        name:       '夫婦の共有予定帳',
        desc:       'パパ・ママ・琴音の予定を一目で共有。月・週カレンダーで管理。',
        url:        'https://fufu-yotei.vercel.app/',
        color:      '#5BA3D0',
        colorLight: '#DBEAFE'
      }
    ];

    function renderApps() {
      var grid = document.getElementById('appGrid');
      APPS.forEach(function(app) {
        var card = document.createElement('a');
        card.href      = app.url;
        card.target    = '_blank';
        card.rel       = 'noopener noreferrer';
        card.className = 'app-card';
        card.innerHTML =
          '<div class="card-icon-wrap" style="background:' + app.colorLight + '">' +
            '<span class="card-icon">' + app.emoji + '</span>' +
          '</div>' +
          '<div class="card-body">' +
            '<h2 class="card-name">' + app.name + '</h2>' +
            '<p class="card-desc">' + app.desc + '</p>' +
          '</div>' +
          '<div class="card-arrow" style="color:' + app.color + '">→</div>';
        grid.appendChild(card);
      });
    }

    // ===== ダッシュボード =====
    var db = null;
    var BIRTHDAY = new Date('2024-02-19T00:00:00');

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // 年齢計算
    function calcAge() {
      var now    = new Date();
      var years  = now.getFullYear() - BIRTHDAY.getFullYear();
      var months = now.getMonth()    - BIRTHDAY.getMonth();
      if (months < 0) { years--; months += 12; }
      var days = Math.floor((now - BIRTHDAY) / 86400000);
      // 次の月齢まで何日か
      var nextBday = new Date(BIRTHDAY);
      nextBday.setFullYear(now.getFullYear());
      nextBday.setMonth(BIRTHDAY.getMonth() + Math.floor((now - BIRTHDAY) / (30.44 * 86400000)) + 1);
      var daysToNext = Math.ceil((nextBday - now) / 86400000);
      return { years: years, months: months, days: days, daysToNext: daysToNext };
    }

    function renderAge() {
      var age = calcAge();
      document.getElementById('ageYears').textContent  = age.years;
      document.getElementById('ageMonths').textContent = age.months;
      document.getElementById('ageDays').textContent   = '生後 ' + age.days.toLocaleString() + ' 日目';
    }

    // 最新写真
    async function loadLatestPhoto() {
      var el = document.getElementById('photoContent');
      try {
        var r = await db
          .from('posts')
          .select('post_date, image_url, comment')
          .order('post_date', { ascending: false })
          .limit(1)
          .single();

        if (r.error || !r.data) {
          el.innerHTML = '<div class="dash-empty-photo">📷 まだ写真がありません</div>';
          return;
        }

        var d       = new Date(r.data.post_date + 'T00:00:00');
        var dateStr = d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });

        el.innerHTML =
          '<img src="' + r.data.image_url + '" class="photo-img" alt="最新のことね" loading="lazy">' +
          '<div class="photo-overlay">' +
            '<span class="photo-date">' + dateStr + '</span>' +
            '<span class="photo-comment">「' + esc(r.data.comment) + '」</span>' +
          '</div>';

      } catch (e) {
        el.innerHTML = '<div class="dash-empty-photo">読み込みエラー</div>';
      }
    }

    // 次のキャンプ
    async function loadNextCamp() {
      var el = document.getElementById('campContent');
      try {
        var r = await db
          .from('camps')
          .select('title, campsite_name, start_date, end_date, camp_members(name)')
          .eq('status', 'planned')
          .order('start_date', { ascending: true, nullsFirst: false })
          .limit(1)
          .single();

        if (r.error || !r.data) {
          el.innerHTML = '<div class="camp-empty">⛺ 予定なし</div>';
          return;
        }

        var c = r.data;
        var dateStr = '';
        if (c.start_date) {
          var d = new Date(c.start_date + 'T00:00:00');
          dateStr = d.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
          if (c.end_date && c.end_date !== c.start_date) {
            var d2 = new Date(c.end_date + 'T00:00:00');
            dateStr += ' 〜 ' + d2.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric' });
          }
        }
        var members = (c.camp_members || []).map(function(m) { return m.name; }).join('・');

        el.innerHTML =
          '<div class="camp-next-title">' + esc(c.title) + '</div>' +
          (c.campsite_name ? '<div class="camp-next-site">📍 ' + esc(c.campsite_name) + '</div>' : '') +
          (dateStr ? '<div class="camp-next-date">📅 ' + dateStr + '</div>' : '') +
          (members ? '<div class="camp-next-members">👥 ' + esc(members) + '</div>' : '');

      } catch (e) {
        el.innerHTML = '<div class="camp-empty">読み込みエラー</div>';
      }
    }

    // 前回のキャンプ
    async function loadLastCamp() {
      var el = document.getElementById('campLastContent');
      try {
        var r = await db
          .from('camps')
          .select('title, campsite_name, start_date, end_date, rating')
          .eq('status', 'completed')
          .order('start_date', { ascending: false })
          .limit(1)
          .single();

        if (r.error || !r.data) {
          el.innerHTML = '<div class="camp-empty">まだ記録がありません</div>';
          return;
        }

        var c = r.data;
        var dateStr = '';
        if (c.start_date) {
          var d = new Date(c.start_date + 'T00:00:00');
          dateStr = d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
          if (c.end_date && c.end_date !== c.start_date) {
            var d2 = new Date(c.end_date + 'T00:00:00');
            var nights = Math.round((new Date(c.end_date) - new Date(c.start_date)) / 86400000);
            dateStr += '（' + nights + '泊）';
          }
        }
        var stars = c.rating ? '⭐'.repeat(c.rating) : '';

        el.innerHTML =
          '<div class="camp-last-title">' + esc(c.title) + '</div>' +
          (c.campsite_name ? '<div class="camp-last-meta">📍 ' + esc(c.campsite_name) + '</div>' : '') +
          (dateStr ? '<div class="camp-last-meta">📅 ' + dateStr + '</div>' : '') +
          (stars ? '<div class="camp-last-stars">' + stars + '</div>' : '');

      } catch (e) {
        el.innerHTML = '<div class="camp-empty">読み込みエラー</div>';
      }
    }

    // 話し合いトピック
    async function loadTopics() {
      var el = document.getElementById('topicsContent');
      try {
        var r = await db
          .from('topics')
          .select('id, title, priority')
          .eq('is_resolved', false)
          .order('created_at', { ascending: false });

        var data = (r.data || []).sort(function(a, b) {
          if (a.priority === 'urgent' && b.priority !== 'urgent') return -1;
          if (b.priority === 'urgent' && a.priority !== 'urgent') return 1;
          return 0;
        });

        if (data.length === 0) {
          el.innerHTML = '<p class="dash-empty">話し合い待ちはありません 👍</p>';
          return;
        }

        var html = '<div class="topics-count">' + data.length + ' 件 話し合い待ち</div>';
        data.slice(0, 4).forEach(function(t) {
          html +=
            '<div class="topic-row">' +
              (t.priority === 'urgent'
                ? '<span class="topic-dot urgent">🔥</span>'
                : '<span class="topic-dot">·</span>') +
              '<span class="topic-text">' + esc(t.title) + '</span>' +
            '</div>';
        });
        if (data.length > 4) {
          html += '<div class="topics-more">他 ' + (data.length - 4) + ' 件…</div>';
        }
        el.innerHTML = html;

      } catch (e) {
        el.innerHTML = '<p class="dash-empty">読み込みエラー</p>';
      }
    }

    // 今週の予定
    var YOTEI_MEMBERS = {
      papa:   { label: 'パパ',  color: '#5BA3D0' },
      mama:   { label: 'ママ',  color: '#E8748A' },
      kotone: { label: '琴音',  color: '#67B899' },
    };
    var YOTEI_DAYS_JA = ['日', '月', '火', '水', '木', '金', '土'];

    function yoteiDateStr(d) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function yoteiFormatDate(s) {
      var p = s.split('-');
      var d = new Date(+p[0], +p[1] - 1, +p[2]);
      return (d.getMonth() + 1) + '/' + d.getDate() + '（' + YOTEI_DAYS_JA[d.getDay()] + '）';
    }

    async function loadYotei() {
      var el = document.getElementById('yoteiContent');
      if (!el) return;
      try {
        var today = new Date();
        var end   = new Date(today);
        end.setDate(end.getDate() + 7);

        var r = await db
          .from('schedules')
          .select('date, date_end, member, event_type, event_label, time_type, confirmed, return_time, needs_dinner')
          .gte('date', yoteiDateStr(today))
          .lte('date', yoteiDateStr(end))
          .order('date');

        if (r.error) throw r.error;

        var data = r.data || [];
        if (data.length === 0) {
          el.innerHTML = '<p class="dash-empty">今週の予定はありません 📭</p>';
          return;
        }

        var EMOJIS = {
          '在宅': '🏠', '早朝出社': '🌅', '出社': '🏢', '遅晩出社': '🌙',
          '出張': '✈️', '飲み会': '🍻', '保育園イベント': '🎒', 'custom': '✏️'
        };

        var html = '';
        data.slice(0, 5).forEach(function (s) {
          var m     = YOTEI_MEMBERS[s.member] || { label: s.member, color: '#999' };
          var emoji = s.event_type === 'custom' ? '✏️' : (EMOJIS[s.event_type] || '📅');
          var label = s.event_type === 'custom' ? (s.event_label || '自由記述') : s.event_type;
          var subParts = [];
          if (s.return_time) {
            subParts.push('<span class="yotei-return">🕐 ' + s.return_time.slice(0, 5) + '</span>');
          }
          if (s.needs_dinner === true) {
            subParts.push('<span class="yotei-dinner">🍚 晩飯いる</span>');
          } else if (s.needs_dinner === false) {
            subParts.push('<span class="yotei-no-dinner">🙅 晩飯いらない</span>');
          }
          html +=
            '<div class="yotei-row">' +
              '<span class="yotei-dot" style="background:' + m.color + '"></span>' +
              '<span class="yotei-date">' + yoteiFormatDate(s.date) + (s.date_end && s.date_end !== s.date ? '〜' + yoteiFormatDate(s.date_end) : '') + '</span>' +
              '<span class="yotei-member" style="color:' + m.color + '">' + esc(m.label) + '</span>' +
              '<span class="yotei-label">' + emoji + ' ' + esc(label) + '</span>' +
              (s.confirmed ? '<span class="yotei-check">✓</span>' : '') +
              (subParts.length ? '<div class="yotei-sub">' + subParts.join('') + '</div>' : '') +
            '</div>';
        });
        if (data.length > 5) {
          html += '<div class="topics-more">他 ' + (data.length - 5) + ' 件…</div>';
        }
        el.innerHTML = html;
      } catch (e) {
        console.error('loadYotei error:', e);
        if (el) el.innerHTML = '<p class="dash-empty">今週の予定はありません 📭</p>';
      }
    }

    // 初期化
    async function init() {
      renderApps();
      renderAge();

      try {
        var res = await fetch('config.json');
        var cfg = await res.json();
        db = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseKey);
      } catch (e) {
        console.error('Config init error:', e);
        document.getElementById('photoContent').innerHTML  = '<div class="dash-empty-photo">接続エラー</div>';
        document.getElementById('topicsContent').innerHTML = '<p class="dash-empty">接続エラー</p>';
        document.getElementById('yoteiContent').innerHTML  = '<p class="dash-empty">接続エラー</p>';
        return;
      }

      // 各ウィジェットを独立して実行（1つのエラーが他に影響しない）
      loadLatestPhoto();
      loadTopics();
      loadNextCamp();
      loadLastCamp();
      loadYotei();
    }

    init();
  </script>
</body>
</html>
